<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>DerBLNguide — Berlin Events</title>
  <meta name="description" content="Your weekly Berlin events guide: music, photography, exhibitions, festivals and more." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-der">Der</span><span class="logo-bln">BLN</span><span class="logo-guide">guide</span>
      </div>
      <div class="header-meta">
        <span id="last-updated" class="last-updated">Loading…</span>
      </div>
    </div>
  </header>

  <!-- WEEK NAV -->
  <nav class="week-nav">
    <div class="week-nav-inner">
      <button class="week-btn" id="prev-week" aria-label="Previous week">&#8592;</button>
      <span class="week-label" id="week-label">This week</span>
      <button class="week-btn" id="next-week" aria-label="Next week">&#8594;</button>
    </div>
  </nav>

  <!-- CATEGORY FILTER -->
  <div class="category-bar">
    <div class="category-bar-inner">
      <button class="cat-chip active" data-cat="all">All</button>
      <button class="cat-chip" data-cat="general">🎪 Festivals</button>
      <button class="cat-chip" data-cat="music">🎵 Music</button>
      <button class="cat-chip" data-cat="photography">📷 Photo Events</button>
      <button class="cat-chip" data-cat="exhibition">🖼 Exhibitions</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="app">
    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <p>Fetching Berlin events…</p>
    </div>
    <div class="error-state hidden" id="error">
      <p>⚠️ Could not load events. Check back soon.</p>
    </div>
    <div id="days-container"></div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p>Data from <a href="https://rausgegangen.de/berlin/" target="_blank" rel="noopener">Rausgegangen</a>, <a href="https://www.tip-berlin.de/event/" target="_blank" rel="noopener">Tip Berlin</a>, <a href="https://www.filmriss.club/events" target="_blank" rel="noopener">Filmriss</a>, <a href="https://www.photography-in.berlin/current/" target="_blank" rel="noopener">Photography in Berlin</a>, <a href="https://de.ra.co/events/de/berlin" target="_blank" rel="noopener">Resident Advisor</a></p>
      <p class="footer-credit">Built for Berlin lovers 🐻</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
