name: Scrape Berlin Events

on:
  schedule:
    # Run at 05:00 and 14:00 Berlin time (03:00 and 12:00 UTC)
    - cron: "0 3 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scrapers
        id: scrape
        run: |
          python scrapers/scrape_all.py
          echo "total=$(python -c "import json; d=json.load(open('data/events.json')); print(d['total'])")" >> $GITHUB_OUTPUT

      - name: Commit and push updated events
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "DerBLNguide Bot"
          git config user.email "bot@derblnguide.invalid"
          git add data/events.json
          if git diff --staged --quiet; then
            echo "No changes to events.json — skipping commit"
          else
            git commit -m "chore: update events data (${{ steps.scrape.outputs.total }} events)"
            git push
          fi
